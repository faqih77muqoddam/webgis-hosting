<!DOCTYPE html>
<html>
<head>
    <title>WebGIS Wonosari Hosting</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        #map {
            height: 100vh;
        }

        .judul {
            position: absolute;
            top: 15px;
            left: 60px;
            z-index: 999;
            background: rgba(255,255,255,0.95);
            padding: 13px 18px;
            border-radius: 12px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.28);
            line-height: 1.4;
        }

        .judul b {
            font-size: 18px;
        }

        .legend {
            background: rgba(255,255,255,0.95);
            padding: 12px 14px;
            border-radius: 12px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.28);
            line-height: 1.7;
            font-size: 13px;
        }

        .legend-title {
            font-weight: bold;
            margin-bottom: 8px;
            font-size: 15px;
        }

        .line-symbol {
            display: inline-block;
            width: 28px;
            height: 0;
            margin-right: 8px;
            vertical-align: middle;
        }

        .polygon-symbol {
            display: inline-block;
            width: 24px;
            height: 12px;
            margin-right: 8px;
            vertical-align: middle;
        }

        .popup-table {
            border-collapse: collapse;
            font-size: 12px;
            max-width: 420px;
        }

        .popup-table td {
            border: 1px solid #ddd;
            padding: 5px 7px;
        }

        .popup-table td:first-child {
            font-weight: bold;
            background: #f5f5f5;
        }

        .leaflet-control-layers {
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.25);
        }
    </style>
</head>

<body>

<div class="judul">
    <b>WebGIS Wonosari</b><br>
    Visualisasi Batas, Jalan, Sungai, dan Dukuh
</div>

<div id="map"></div>

<script>
    var map = L.map("map").setView([-7.693, 110.386], 14);

    var osm = L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        attribution: "OpenStreetMap"
    }).addTo(map);

    var satellite = L.tileLayer(
        "https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",
        { attribution: "Esri World Imagery" }
    );

    var batasLayer = L.geoJSON(null, {
        style: {
            color: "#FF0000",
            weight: 2,
            opacity: 1
        },
        onEachFeature: popupFeature("Batas Dukuh")
    });

    var jalanLayer = L.geoJSON(null, {
        style: {
            color: "#ff8800",
            weight: 3,
            opacity: 1
        },
        onEachFeature: popupFeature("Jalan Dukuh")
    });

    var sungaiLayer = L.geoJSON(null, {
        style: {
            color: "#1E90FF",
            weight: 4,
            opacity: 1
        },
        onEachFeature: popupFeature("Sungai Dukuh")
    });

    var wonosariLayer = L.geoJSON(null, {
        style: {
            color: "#228B22",
            weight: 1.5,
            fillColor: "#7CFC00",
            fillOpacity: 0.35
        },
        onEachFeature: popupFeature("Area Dukuh Wonosari")
    });

    fetch("data/batasdukuh.geojson")
        .then(res => res.json())
        .then(data => batasLayer.addData(data));

    fetch("data/jalandukuh.geojson")
        .then(res => res.json())
        .then(data => jalanLayer.addData(data));

    fetch("data/sungaidukuh.geojson")
        .then(res => res.json())
        .then(data => sungaiLayer.addData(data));

    fetch("data/geo3_dk_wonosari.geojson")
        .then(res => res.json())
        .then(data => {
            wonosariLayer.addData(data);
            map.fitBounds(wonosariLayer.getBounds());
        });

    wonosariLayer.addTo(map);
    batasLayer.addTo(map);
    jalanLayer.addTo(map);
    sungaiLayer.addTo(map);

    var baseMaps = {
        "OpenStreetMap": osm,
        "Satellite": satellite
    };

    var overlayMaps = {
        "Area Dukuh Wonosari": wonosariLayer,
        "Batas Dukuh": batasLayer,
        "Jalan Dukuh": jalanLayer,
        "Sungai Dukuh": sungaiLayer
    };

    L.control.layers(baseMaps, overlayMaps).addTo(map);

    L.control.scale({
        position: "bottomleft",
        metric: true,
        imperial: false
    }).addTo(map);

    function popupFeature(title) {
        return function(feature, layer) {
            layer.on("click", function(e) {
                var props = feature.properties;
                var content = "<b>" + title + "</b><br><br>";
                content += "<table class='popup-table'>";

                for (var key in props) {
                    if (props[key] !== null && props[key] !== "") {
                        content +=
                            "<tr>" +
                            "<td>" + key + "</td>" +
                            "<td>" + props[key] + "</td>" +
                            "</tr>";
                    }
                }

                content += "</table>";

                L.popup({ maxWidth: 500 })
                    .setLatLng(e.latlng)
                    .setContent(content)
                    .openOn(map);
            });
        };
    }

    var legend = L.control({ position: "bottomright" });

    legend.onAdd = function () {
        var div = L.DomUtil.create("div", "legend");

        div.innerHTML = `
            <div class="legend-title">Legenda</div>

            <div>
                <span class="polygon-symbol" style="background: rgba(124,252,0,0.35); border: 2px solid #228B22;"></span>
                Area Dukuh
            </div>

            <div>
                <span class="line-symbol" style="border-top: 3px solid #FF0000;"></span>
                Batas Dukuh
            </div>

            <div>
                <span class="line-symbol" style="border-top: 3px solid #ff8800;"></span>
                Jalan Dukuh
            </div>

            <div>
                <span class="line-symbol" style="border-top: 3px solid #1E90FF;"></span>
                Sungai Dukuh
            </div>
        `;

        return div;
    };

    legend.addTo(map);
</script>

</body>
</html>
